<!DOCTYPE html>
<html lang="ko">

<head>
  <title>myBEAKER</title>

  <meta charset="utf-8" />
  <meta name="format-detection" content="telephone=no" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- favicon -->
  <link rel="icon" href="./assets/images/common/favicon.ico" type="image/x-icon" />
  <!-- //favicon -->

  <!-- style -->
  <link type="text/css" rel="stylesheet" href="./assets/css/ui-style.css" />
  <!-- //style -->


</head>

<!-- 전달사항 :: 모달 표출시 .modal-open 붙여주세요 -->

<body class="modal-open">

  <!-- modal 모달 -->
  <!-- 전달사항 :: 클래스 in 있을 때 모달 표출 -->
  <div class="modal-backdrop fade in"></div>
  <div id="myModal" class="modal fade in">
    <div class="modal-dialog">
      <div class="modal-content modal-content__width--82">
        <!-- 2023.03.27 : del : .modal-header__mb--10 삭제 -->
        <div class="modal-header">
          <div class="modal-title">내용물/ 검색</div>
          <button type="button" class="modal-close"></button>
        </div>

        <div class="modal-body">

          <!-- 2023.03.27 : mod : 위치 이동 및 .p-0 추가 -->
          <section class="search-bar p-0">
            <h2 class="for-a11y">검색</h2>

            <div class="search-bar__left">
              <div class="search-bar__row">
                <dl class="search-bar__item search-bar__item--width-100">
                  <dt class="search-bar__key">검색</dt>
                  <dd class="search-bar__val search-bar__val--flex">
                    <div class="search-form">
                      <div class="search-form__inner">
                        <input type="text" class="ui-input ui-input__width--full" placeholder="내용물코드 or 내용물명">
                        <button type="button" class="button-search">검색</button>
                      </div>
                    </div>

                  </dd>
                </dl>
              </div>
            </div>
          </section>

          <div class="contents-tab">
            <div class="contents-tab__inner">
              <!-- 2023.03.27 : add : .mb-15 추가 -->
              <div class="contents-tab__header mb-15">
                <ul class="ui-list contents-tab__lists">
                  <li class="contents-tab__list"><a href="javascript:void(0)" class="contents-tab__link">실험노트</a></li>
                  <li class="contents-tab__list is-active"><a href="javascript:void(0)" class="contents-tab__link">SAP</a>
                  </li>
                </ul>
                <button type="button" class="tab-header__button"></button>
              </div>
              <div class="contents-tab__body">

                

                <div class="myboard-table">
                  <div class="myboard-table__inner">
                    <table class="ui-table ui-table__th--border-radius--0 ui-table__td--40 text-center">
                      <colgroup>
                        <col style="width:20%">
                        <col style="width:auto">
                      </colgroup>
                      <thead>
                        <tr>
                          <th>내용물코드</th>
                          <th>내용물명</th>
                        </tr>
                      </thead>
                      <tbody>
                        <tr>
                          <td colspan="2">
                            <div class="no-result">
                              - SAP 코드를 검색해 주세요. -
                            </div>
                          </td>
                        </tr>
                      </tbody>
                    </table>
                  </div>
                </div>

                <div class="board-bottom ">
                  <div class="board-bottom__inner">
                    <div class="pagination">
                      <div class="pagination__inner">
                        <a href="javascript:void(0)" class="paging paging-prev"></a>
                        <a href="javascript:void(0)" class="paging is-active">1</a>
                        <a href="javascript:void(0)" class="paging">2</a>
                        <a href="javascript:void(0)" class="paging">3</a>
                        <a href="javascript:void(0)" class="paging">4</a>
                        <a href="javascript:void(0)" class="paging">5</a>
                        <a href="javascript:void(0)" class="paging paging-next"></a>
                      </div>
                    </div>
                  </div>

                </div>


              </div>
            </div>
          </div>



        </div>

      </div><!-- /.modal-content -->
    </div><!-- /.modal-dialog -->
  </div>
  <!--// modal 모달 -->

</body>

</html>
