<head>

  <!-- favicon -->
  <link rel="icon" href="./assets/images/common/favicon.ico" type="image/x-icon" />
  <!-- //favicon -->

  <!-- style -->

<!-- 전달사항 :: 모달 표출시 .modal-open 붙여주세요 -->

<body class="modal-open">

  <!-- modal 모달 -->
  <!-- 전달사항 :: 클래스 in 있을 때 모달 표출 -->
  <div class="modal-backdrop fade in"></div>
  <div id="myModal" class="modal fade in">
    <div class="modal-dialog">
      <div class="modal-content modal-content__width--auto">
        <div class="modal-header modal-header__mb--10">
          <div class="modal-title">QR코드</div>
          <button type="button" class="modal-close"></button>
        </div>

        <div class="modal-body">

          <div class="make-qr">
            <div class="make-qr__inner">
              <div class="make-qr__left">
                <div class="make-qr__image">
                  <img src="./assets/images/_dummy/img-qr2.png" alt="">
                </div>
                <div class="make-qr__code">원-22-00151</div>
                <div class="make-qr__tags">
                  <div class="make-qr__tag make-qr__tag--blue">방부</div>
                </div>
              </div>
              <div class="make-qr__right">
                <div class="make-qr__right--top">
                  <div class="make-qr__tags">
                    <div class="make-qr__tag make-qr__tag--blue">방부</div>
                  </div>
                  <div class="make-qr__code">원-22-00151</div>
                </div>
                <div class="make-qr__name">(PF)(기)베리떼 라이트터치선스틱 SPF50+PA++++</div>
                <div class="make-qr__detail">
                  <div class="make-qr__image">
                    <img src="./assets/images/_dummy/img-qr2.png" alt="">
                  </div>
                  <div class="make-qr__detail--right">
                    <div class="make-qr__info"><span class="make-qr__num">3102760</span> Ver #04 Lot #01</div>
                    <div class="make-qr__who">연구인프라운영 Lab 박미주</div>
                    <div class="make-qr__date">의뢰일자: 2022.10.27</div>
                  </div>
                </div>


              </div>
            </div>
          </div>



        </div>

      </div>
    </div><!-- /.modal-content -->
  </div><!-- /.modal-dialog -->
  </div>
  <!--// modal 모달 -->
