<!DOCTYPE html>
<html lang="ko">

<head>
  <title>myBEAKER</title>

  <meta charset="utf-8" />
  <meta name="format-detection" content="telephone=no" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- favicon -->
  <link rel="icon" href="./assets/images/common/favicon.ico" type="image/x-icon" />
  <!-- //favicon -->

  <!-- style -->
  <link type="text/css" rel="stylesheet" href="./assets/css/ui-style.css" />
  <!-- //style -->
</head>

<!-- 전달사항 :: 모달 표출시 .modal-open 붙여주세요 -->

<body class="modal-open">
  <!-- modal 모달 -->
  <!-- 전달사항 :: 클래스 in 있을 때 모달 표출 -->
  <div class="modal-backdrop fade in"></div>
  <div id="myModal" class="modal fade in">
    <div class="modal-dialog">
      <div class="modal-content modal-content__width--640">
        <div class="modal-header">
          <div class="modal-title">의견작성</div>
          <button type="button" class="modal-close"></button>
        </div>
        <div class="modal-body">
          <div class="search-depart-table">
            <div class="search-depart-table__inner">
              <table class="ui-table__td--40">
                <colgroup>
                  <col style="width:13rem">
                  <col style="width:auto">
                </colgroup>
                <tbody>
                  <tr>
                    <th>구분</th>
                    <td>
                      <div class="ui-radio__list">
                        <div class="ui-radio__inner">
                          <div class="ui-radio-block">
                            <input type="radio" class="ui-radio" checked="">
                            <label class="ui-label">
                              <span class="ui-radio-object"></span>
                              <span class="ui-label__text">승인</span>
                            </label>
                          </div>
                          <div class="ui-radio-block">
                            <input type="radio" class="ui-radio">
                            <label class="ui-label">
                              <span class="ui-radio-object"></span>
                              <span class="ui-label__text">반려</span>
                            </label>
                          </div>
                        </div>
                      </div>
                    </td>
                  </tr>
                  <tr>
                    <th>의견</th>
                    <td>
                      <div class="ui-textarea-box ui-textarea-box__height--140">
                        <textarea class="ui-textarea"></textarea>
                      </div>
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
          
          <div class="board-bottom">
            <div class="board-bottom__inner">
              <div class="ui-buttons ui-buttons__right">
                <button type="button" class="ui-button ui-button__bg--skyblue font-weight__300">확인</button>
                <button type="button" class="ui-button ui-button__bg--lightgray">취소</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div><!-- /.modal-content -->
  </div><!-- /.modal-dialog -->
  </div>
  <!--// modal 모달 -->

</body>

</html>
