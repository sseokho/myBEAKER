<!DOCTYPE html>
<html lang="ko">

<head>
  <title>myBEAKER</title>

  <meta charset="utf-8" />
  <meta name="format-detection" content="telephone=no" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- favicon -->
  <link rel="icon" href="./assets/images/common/favicon.ico" type="image/x-icon" />
  <!-- //favicon -->

  <!-- style -->
  <link type="text/css" rel="stylesheet" href="./assets/css/ui-style.css" />
  <!-- //style -->

  <!-- 메뉴 기능 위한 스크립트 -->
  <script src="../dist/assets/js/jquery.js"></script>
  <script src="../dist/assets/js/ui-script.js"></script>
</head>

<!-- 전달사항 :: 모달 표출시 .modal-open 붙여주세요 -->
<body class="modal-open">

    <!-- modal 모달 -->
    <!-- 전달사항 :: 클래스 in 있을 때 모달 표출 -->
    <div class="modal-backdrop fade in"></div>
    <div id="myModal" class="modal fade in">
      <div class="modal-dialog">
        <div class="modal-content modal-content__width--640">
          <div class="modal-header">
            <div class="modal-title">3자코드 채번</div>
            <button type="button" class="modal-close"></button>
          </div>

          <div class="modal-body">
            <div class="basic-info__table">
              <table class="ui-table__contents">
                <colgroup>
                  <col style="width:7.2rem">
                  <col style="width:auto">
                  <col style="width:7.2rem">
                  <col style="width:auto">
                  <col style="width:7.2rem">
                </colgroup>
                <tbody>
                  <tr>
                    <th>브랜드</th>
                    <td>
                      <select class="ui-select ui-select__width--176">
                        <option>선택</option>
                        <option>선택</option>
                        <option>선택</option>
                      </select>
                    </td>
                    <th>플랜트</th>
                    <td>
                      <select class="ui-select ui-select__width--194">
                        <option>선택</option>
                        <option>선택</option>
                        <option>선택</option>
                      </select>
                    </td>
                    <td>
                      <button type="button" class="ui-button ui-button__bg--blue ml-10">추가</button>
                    </td>
                  </tr>
                  <tr>
                    <th>내용물명</th>
                    <td colspan="4">
                      <input type="text" class="ui-input ui-input__width--full" placeholder="내용물 명을 입력해주세요.">   
                    </td>
                  </tr>
                </tbody>
              </table>

              <div class="board-bottom ">
                <div class="board-bottom__inner">
                  <div class="ui-buttons ml-auto ui-buttons__right">
                    <button type="button" class="ui-button ui-button__bg--skyblue">코드채번</button>
                    <!-- 2023.04.06 : add : 닫기 버튼 추가 -->
                    <button type="button" class="ui-button ui-button__bg--lightgray">닫기</button>
                  </div>
                </div>
              </div>

            </div>
          </div>

        </div><!-- /.modal-content -->
      </div><!-- /.modal-dialog -->
    </div>
    <!--// modal 모달 -->

</body>

</html>
