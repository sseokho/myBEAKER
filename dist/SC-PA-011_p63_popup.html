<!DOCTYPE html>

  <!-- favicon -->

            </div>
            <section class="search-bar p-0">
              <h2 class="for-a11y">검색</h2>

                <div class="search-bar__row">
                  <dl class="search-bar__item">
                    <dd class="search-bar__val">
                      <div class="form-flex">

                        <div class="form-flex-cell form-flex__cell--5">

                              <input type="text" class="ui-input ui-input__width--318" placeholder="예시) 0000±0000, Spindle: 64qjs, 12rpm, 2m">

                            </div>
                          </div>
                        </div>
                      </div>
                    </dd>
                  </dl>
                  <dl class="search-bar__item search-bar__item--flexible ml-20">

                    <dd class="search-bar__val search-bar__val--flexible">
                      <input type="text" class="ui-input ui-input__width--full">
                    </dd>

                  </dl>
                </div>
              </div>

              </div>
            </div>
            
          </div>

                    </dd>

                <div class="search-bar__row">

                        </div>
                      </div>
                    </dd>
                  </dl>
                </div>
  
              </div>

                          <div class="form-flex-cell mt-10">

                                </div>
                              </div>
                            </div>
                          </div>
                        </div>

                      <td rowspan="2">

                      </td>
                      <td>
                        <div class="ui-buttons__material-result">

                          <button class="ui-button__material-result ui-button__material-result--o is-active"></button>
                          <button class="ui-button__material-result ui-button__material-result--triangle"></button>
                          <button class="ui-button__material-result ui-button__material-result--x"></button>
                        </div>
                      </td>
                      <td>
                        <div class="ui-buttons__material-result">
                          <!-- 전달사항 :: 활성화 시 is-active 붙습니다. -->

                          <button class="ui-button__material-result ui-button__material-result--triangle is-active"></button>
                          <button class="ui-button__material-result ui-button__material-result--x"></button>
                        </div>
                      </td>
                      <td>

                          <!-- 전달사항 :: 활성화 시 is-active 붙습니다. -->
                          <button class="ui-button__material-result ui-button__material-result--o"></button>
                          <button class="ui-button__material-result ui-button__material-result--triangle"></button>
                          <button class="ui-button__material-result ui-button__material-result--x is-active"></button>

                      </td>
                      <td>

                          <button class="ui-button__material-result ui-button__material-result--o"></button>
                          <button class="ui-button__material-result ui-button__material-result--triangle"></button>
                          <button class="ui-button__material-result ui-button__material-result--x"></button>

                    <tr>
