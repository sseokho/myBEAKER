<!DOCTYPE html>
<html lang="ko">

<head>
    <title>myBEAKER</title>

    <meta charset="utf-8" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- favicon -->
    <link rel="icon" href="./assets/images/common/favicon.ico" type="image/x-icon" />
    <!-- //favicon -->

    <!-- style -->
    <link type="text/css" rel="stylesheet" href="./assets/css/ui-style.css" />
    <!-- //style -->

</head>

<body>

    <div class="wrap wrap-common">


        <div class="ui-layout ui-layout__common">
            <div class="ui-layout__inner">
                <div class="login">
                    <div class="login__inner">
                        <div class="login-box">
                            <div class="login-logo"><span class="for-a11y">my BEAKER LOGIN</span></div>
                            <div class="login-text">사번 / 패스워드를 입력해 주세요</div>
                            <div class="login-input">
                                <div class="cell-col">
                                    <div class="ui-form form-input">
                                        <input type="text" class="ui-input ui-input__login" placeholder="사번">
                                    </div>
                                </div>
                                <div class="cell-col">
                                    <div class="ui-form form-input">
                                        <input type="text" class="ui-input ui-input__login" placeholder="패스워드">
                                    </div>
                                </div>

                                <div class="save-id">
                                    <!-- 2023.04.11 : mod : checked가 디폴트 -->
                                    <input type="checkbox" id="switch" checked>
                                    <label for="switch" class="switch_label">
                                        <span class="onf_btn"></span>
                                    </label>
                                    <span class="save-id__text">아이디 저장</span>
                                </div>

                                <div class="login-button__wrap">
                                    <button type="button" class="login-button">로그인</button>
                                </div>
                            </div>
                        </div>

                    </div>
                </div>

            </div>
        </div>
    </div>

</body>

</html>
