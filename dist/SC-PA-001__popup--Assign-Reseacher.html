<!DOCTYPE html>
<html lang="ko">

<head>
  <title>myBEAKER</title>

  <meta charset="utf-8" />
  <meta name="format-detection" content="telephone=no" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- favicon -->
  <link rel="icon" href="./assets/images/common/favicon.ico" type="image/x-icon" />
  <!-- //favicon -->

  <!-- style -->
  <link type="text/css" rel="stylesheet" href="./assets/css/ui-style.css" />
  <!-- //style -->


</head>

<!-- 전달사항 :: 모달 표출시 .modal-open 붙여주세요 -->

<body class="modal-open">

  <!-- modal 모달 -->
  <!-- 전달사항 :: 클래스 in 있을 때 모달 표출 -->
  <div class="modal-backdrop fade in"></div>
  <div id="myModal" class="modal fade in">
    <div class="modal-dialog">
      <div class="modal-content modal-content__width--530">
        <div class="modal-header">
          <div class="modal-title">담당자 지정</div>
          <button type="button" class="modal-close"></button>
        </div>

        <div class="modal-body">

          <section class="search-bar">
            <h2 class="for-a11y">검색</h2>
            <div class="search-bar__left">
              <div class="search-bar__row">
                <dl class="search-bar__item search-bar__item--width-100">
                  <dt class="search-bar__key search-bar__key--width-8">담당자 지정</dt>
                  <dd class="search-bar__val search-bar__val--flex">
                    <div class="search-form">
                      <div class="search-form__inner">
                        <input type="text" class="ui-input ui-input__width--full" placeholder="내용물코드 or 내용물명">
                        <button type="button" class="button-search">검색</button>
                      </div>
                    </div>

                  </dd>
                </dl>
              </div>
            </div>
          </section>
          <div class="board-bottom">
            <div class="board-bottom__inner">
              <div class="ui-buttons ui-buttons__right">
                <button type="button" class="ui-button ui-button__bg--skyblue font-weight__300">저장</button>
                <button type="button" class="ui-button ui-button__bg--lightgray">닫기</button>
              </div>
            </div>
          </div>

    
        </div>

      </div><!-- /.modal-content -->
    </div><!-- /.modal-dialog -->
  </div>
  <!--// modal 모달 -->

</body>

</html>
